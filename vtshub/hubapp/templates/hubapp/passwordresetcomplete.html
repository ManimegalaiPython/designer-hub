{% extends 'hubapp/base.html' %}
{% load static %}

{% block extra_head %}
<style>
    .complete-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(2px);
        border: 1px solid rgba(196, 181, 253, 0.4);
        border-radius: 28px;
        box-shadow: 0 20px 40px rgba(124, 58, 237, 0.12);
    }
    .success-icon {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #DCFCE7, #BBF7D0);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }
    .btn-login {
        background: linear-gradient(135deg, #6C63FF, #8B5CF6);
        border: none;
        border-radius: 60px;
        padding: 12px 30px;
        font-weight: 600;
        transition: all 0.2s;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 my-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="complete-card p-4 p-md-5 text-center">
                <div class="success-icon mb-4">
                    <i class="bi bi-check-lg" style="font-size: 2.8rem; color: #166534;"></i>
                </div>
                <h3 class="fw-bold">Password reset complete</h3>
                <p class="text-muted mt-3">Your password has been successfully reset. You can now log in with your new credentials.</p>
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-login text-white">Go to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'hubapp/base.html' %}
{% load static %}

{% block extra_head %}
<style>
    .reset-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(2px);
        border: 1px solid rgba(196, 181, 253, 0.4);
        border-radius: 28px;
        box-shadow: 0 20px 40px rgba(124, 58, 237, 0.12);
    }
    .reset-title {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        color: #1a1a2e;
        letter-spacing: -0.3px;
    }
    .reset-input {
        border-radius: 60px;
        border: 1.5px solid #e2e8f0;
        padding: 12px 20px;
        transition: all 0.2s;
    }
    .reset-input:focus {
        border-color: #7C3AED;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        outline: none;
    }
    .btn-reset {
        background: linear-gradient(135deg, #6C63FF, #8B5CF6);
        border: none;
        border-radius: 60px;
        padding: 12px;
        font-weight: 700;
        font-size: 1rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
    }
    .back-link {
        color: #7C3AED;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s;
    }
    .back-link:hover {
        color: #4C1D95;
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 my-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="reset-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-key-fill" style="font-size: 2.5rem; color: #7C3AED;"></i>
                    <h3 class="reset-title mt-2">Reset password</h3>
                    <p class="text-muted">Enter your email and we’ll send you a reset link.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" name="email" class="form-control reset-input" placeholder="you@example.com" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-reset w-100 text-white">Send reset link</button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="back-link">← Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
